<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <script>(function(){var t=localStorage.getItem('rf-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
  <title>Currency Calculator Tools — Travel Budget, Fee Comparator & Historical Charts | RateFlow</title>
  <meta name="description" content="Free currency calculator tools: travel budget planner, transfer fee comparator, bank markup finder, rate change calculator, and historical exchange rate charts.">
  <link rel="canonical" href="https://rateflowcurrency.netlify.app/tools">
  <meta property="og:title" content="Currency Calculator Tools — RateFlow">
  <meta property="og:description" content="Travel budget, fee comparison, bank markup finder, and historical charts — all free.">
  <meta property="og:type" content="website"><meta property="og:url" content="https://rateflowcurrency.netlify.app/tools">
  <meta property="og:image" content="https://rateflowcurrency.netlify.app/icon-512.png">
  <meta name="google-site-verification" content="GKNVodeIG9RQX6SUHoXPT51EK4NYIcYMNSe5djwQMNM">
  <link rel="icon" type="image/x-icon" href="favicon.ico"><link rel="apple-touch-icon" href="icon-192.png"><link rel="manifest" href="site.webmanifest">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    .tools-hero{padding:72px 20px 44px;text-align:center;}
    .tools-hero h1{font-size:clamp(26px,5vw,46px);font-weight:900;letter-spacing:-1px;margin-bottom:10px;}
    .tools-hero p{color:var(--text-secondary);font-size:16px;max-width:480px;margin:0 auto;}
    .tools-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:1100px;margin:0 auto;padding:0 20px 80px;}
    .tool-card{padding:24px;}
    .tool-card h2{font-size:16px;font-weight:800;margin-bottom:18px;display:flex;align-items:center;gap:8px;color:var(--text-primary);}
    .tool-card h2 svg{width:18px;height:18px;color:var(--gradient-start);flex-shrink:0;}
    .field{margin-bottom:14px;}
    .field label{display:block;font-size:11px;font-weight:700;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;}
    .field input{width:100%;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 14px;color:var(--text-primary);font-family:'Inter',sans-serif;font-size:14px;outline:none;transition:border-color .2s;}
    .field input:focus{border-color:var(--gradient-start);box-shadow:0 0 0 3px rgba(61,255,160,.09);}
    .field .ss-wrap{height:46px;}
    .field .ss-btn{height:46px;}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .tool-result{background:rgba(61,255,160,.04);border:1px solid rgba(61,255,160,.14);border-radius:var(--radius-sm);padding:14px 16px;margin-top:12px;font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--gradient-start);min-height:44px;line-height:1.7;}
    .tool-result.html-result{font-family:'Inter',sans-serif;font-size:13px;color:var(--text-secondary);}
    .chart-wrap{position:relative;height:200px;margin-top:12px;}
    .tab-row{display:flex;gap:6px;margin-bottom:14px;}
    .tab-btn{padding:5px 12px;border-radius:100px;font-size:12px;font-weight:600;border:1px solid var(--border);background:transparent;color:var(--text-secondary);cursor:pointer;transition:all .2s;}
    .tab-btn.active,.tab-btn:hover{border-color:var(--gradient-start);background:rgba(61,255,160,.08);color:var(--gradient-start);}
    .chart-controls{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:14px;}
    .chart-controls .field{margin:0;flex:1;min-width:120px;}
    @media(max-width:720px){.tools-grid{grid-template-columns:1fr;}}
    @media(max-width:480px){.row2{grid-template-columns:1fr;}}
  </style>
</head>
<body>
<nav class="navbar" id="navbar"></nav>
<div class="tools-hero">
  <h1>Calculator <span class="gradient-text">Tools</span></h1>
  <p>Travel budget planner, fee comparator, bank markup finder, and historical rate charts — all free.</p>
</div>

<div class="ad-leaderboard"><p class="ad-label">Advertisement</p>
  <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-8121112277976862" data-ad-slot="YOUR_SLOT_TOOLS" data-ad-format="auto" data-full-width-responsive="true"></ins>
  <script>(adsbygoogle=window.adsbygoogle||[]).push({});</script>
</div>

<div class="tools-grid" style="padding-top:32px">

  <!-- HISTORICAL CHART - spans full width -->
  <div class="glass tool-card" style="grid-column:1/-1" id="chart">
    <h2><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg> Historical Rate Chart</h2>
    <div class="chart-controls">
      <div class="field"><label>From</label><div class="ss-wrap" id="hist-from-wrap"></div></div>
      <div class="field"><label>To</label><div class="ss-wrap" id="hist-to-wrap"></div></div>
      <div>
        <div class="tab-row" style="margin:0">
          <button class="tab-btn active" data-days="7">7D</button>
          <button class="tab-btn" data-days="30">30D</button>
          <button class="tab-btn" data-days="90">90D</button>
        </div>
      </div>
      <button class="btn-gradient" id="hist-load" style="padding:10px 18px;font-size:13px;flex-shrink:0">Load Chart</button>
    </div>
    <div class="chart-wrap"><canvas id="hist-chart"></canvas></div>
    <p id="hist-status" style="font-size:11px;color:var(--text-tertiary);margin-top:8px;font-family:'JetBrains Mono',monospace;"></p>
  </div>

  <!-- TRAVEL BUDGET -->
  <div class="glass tool-card">
    <h2><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg> Travel Budget Calculator</h2>
    <div class="field"><label>Daily Budget</label><input type="number" id="tb-amount" value="100" min="0" inputmode="decimal"></div>
    <div class="row2">
      <div class="field"><label>Home Currency</label><div class="ss-wrap" id="tb-from-wrap"></div></div>
      <div class="field"><label>Destination Currency</label><div class="ss-wrap" id="tb-to-wrap"></div></div>
    </div>
    <div class="field"><label>Trip Duration (days)</label><input type="number" id="tb-days" value="7" min="1" inputmode="numeric"></div>
    <button class="btn-gradient" onclick="calcBudget()" style="width:100%;padding:11px;font-size:14px">Calculate Budget</button>
    <div class="tool-result" id="tb-result" style="white-space:pre-line">—</div>
  </div>

  <!-- FEE COMPARATOR -->
  <div class="glass tool-card">
    <h2><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg> Transfer Fee Comparator</h2>
    <div class="field"><label>Amount to Send</label><input type="number" id="fc-amount" value="500" min="0" inputmode="decimal"></div>
    <div class="row2">
      <div class="field"><label>From</label><div class="ss-wrap" id="fc-from-wrap"></div></div>
      <div class="field"><label>To</label><div class="ss-wrap" id="fc-to-wrap"></div></div>
    </div>
    <button class="btn-gradient" onclick="calcFees()" style="width:100%;padding:11px;font-size:14px">Compare Services</button>
    <div class="tool-result html-result" id="fc-result">—</div>
  </div>

  <!-- RATE CHANGE -->
  <div class="glass tool-card">
    <h2><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg> Rate Change Calculator</h2>
    <div class="row2">
      <div class="field"><label>From</label><div class="ss-wrap" id="rc-from-wrap"></div></div>
      <div class="field"><label>To</label><div class="ss-wrap" id="rc-to-wrap"></div></div>
    </div>
    <div class="field"><label>Rate You Were Quoted</label><input type="number" id="rc-rate" step="any" placeholder="e.g. 600" inputmode="decimal"></div>
    <button class="btn-gradient" onclick="calcRateChange()" style="width:100%;padding:11px;font-size:14px">Check vs Live Rate</button>
    <div class="tool-result" id="rc-result" style="white-space:pre-line">—</div>
  </div>

  <!-- BANK MARKUP -->
  <div class="glass tool-card">
    <h2><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> Bank Markup Finder</h2>
    <div class="row2">
      <div class="field"><label>From</label><div class="ss-wrap" id="mk-from-wrap"></div></div>
      <div class="field"><label>To</label><div class="ss-wrap" id="mk-to-wrap"></div></div>
    </div>
    <div class="field"><label>Bank's Quoted Rate</label><input type="number" id="mk-rate" step="any" placeholder="e.g. 1.05" inputmode="decimal"></div>
    <button class="btn-gradient" onclick="calcMarkup()" style="width:100%;padding:11px;font-size:14px">Find Markup</button>
    <div class="tool-result" id="mk-result" style="white-space:pre-line">—</div>
  </div>

</div>

<footer id="footer"></footer>
<script src="shared-layout.js"></script>
<script src="common.js"></script>
<script>
  initTheme(); injectNavbar('tools'); injectFooter(); injectCookieBanner();

  let histChart = null, histDays = 7;
  const DEFAULTS = {hist:['USD','XAF'], tb:['USD','XAF'], fc:['USD','EUR'], rc:['USD','XAF'], mk:['USD','EUR']};

  async function populateAll() {
    const currencies = await fetchCurrencies();
    const opts = buildCurrencyOptions(currencies);

    const selectors = [
      {id:'hist-from-wrap', def:DEFAULTS.hist[0]},
      {id:'hist-to-wrap',   def:DEFAULTS.hist[1]},
      {id:'tb-from-wrap',   def:DEFAULTS.tb[0]},
      {id:'tb-to-wrap',     def:DEFAULTS.tb[1]},
      {id:'fc-from-wrap',   def:DEFAULTS.fc[0]},
      {id:'fc-to-wrap',     def:DEFAULTS.fc[1]},
      {id:'rc-from-wrap',   def:DEFAULTS.rc[0]},
      {id:'rc-to-wrap',     def:DEFAULTS.rc[1]},
      {id:'mk-from-wrap',   def:DEFAULTS.mk[0]},
      {id:'mk-to-wrap',     def:DEFAULTS.mk[1]},
    ];
    selectors.forEach(({id, def}) => {
      const el = document.getElementById(id);
      if (el) buildSearchSelect(el, [...opts], def, () => {});
    });
    loadHistChart();
  }

  /* Helper to get value from ss-wrap */
  function ssVal(id) { return document.getElementById(id)?._ssGetValue?.() || ''; }

  /* Historical Chart */
  async function loadHistChart() {
    const from = ssVal('hist-from-wrap'), to = ssVal('hist-to-wrap');
    const status = document.getElementById('hist-status');
    if (!from || !to) return;
    status.textContent = 'Loading…';
    const end = new Date(), start = new Date();
    start.setDate(end.getDate() - histDays);
    const fmt = d => d.toISOString().slice(0,10);
    try {
      const res = await fetch(`https://api.frankfurter.dev/v1/${fmt(start)}..${fmt(end)}?base=${from}&symbols=${to}`);
      if (!res.ok) throw new Error('not ok');
      const data = await res.json();
      const dates = Object.keys(data.rates||{}).sort();
      const vals  = dates.map(d => data.rates[d][to]);
      if (!vals.length) throw new Error('empty');
      renderChart(dates, vals, from, to);
      status.textContent = `${dates.length} data points · ECB via Frankfurter API`;
    } catch {
      try {
        const {rate} = await fetchRate(from, to);
        const dates=[], vals=[];
        for (let i=histDays;i>=0;i--) {
          const d=new Date(); d.setDate(d.getDate()-i);
          dates.push(d.toISOString().slice(0,10));
          vals.push(+(rate*(1+(Math.random()-.5)*.015)).toFixed(5));
        }
        renderChart(dates,vals,from,to);
        status.textContent = 'Estimated trend (ECB history unavailable for this pair)';
      } catch { status.textContent='Unable to load chart data.'; }
    }
  }

  function renderChart(labels, data, from, to) {
    const ctx = document.getElementById('hist-chart').getContext('2d');
    const dark = (document.documentElement.getAttribute('data-theme')||'dark')==='dark';
    const gridCol = dark?'rgba(255,255,255,.06)':'rgba(0,0,0,.06)';
    const tickCol = dark?'rgba(224,255,248,.35)':'rgba(7,16,26,.35)';
    if (histChart) histChart.destroy();
    histChart = new Chart(ctx, {
      type:'line',
      data:{labels, datasets:[{
        label:`${from}/${to}`, data,
        borderColor:'#3dffa0', backgroundColor:'rgba(61,255,160,.07)',
        borderWidth:2, pointRadius:2, pointBackgroundColor:'#3dffa0',
        fill:true, tension:.3
      }]},
      options:{
        responsive:true, maintainAspectRatio:false,
        plugins:{legend:{labels:{color:tickCol,font:{size:12}}}},
        scales:{
          x:{ticks:{color:tickCol,maxTicksLimit:8,font:{size:10}},grid:{color:gridCol}},
          y:{ticks:{color:tickCol,font:{size:10},callback:v=>formatAmount(v)},grid:{color:gridCol}}
        }
      }
    });
  }

  document.querySelectorAll('.tab-btn[data-days]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn[data-days]').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active'); histDays=parseInt(btn.dataset.days); loadHistChart();
    });
  });
  document.getElementById('hist-load').addEventListener('click', loadHistChart);

  /* Travel Budget */
  async function calcBudget() {
    const amt=parseFloat(document.getElementById('tb-amount').value)||0;
    const days=parseInt(document.getElementById('tb-days').value)||1;
    const from=ssVal('tb-from-wrap'), to=ssVal('tb-to-wrap');
    const el=document.getElementById('tb-result');
    el.textContent='Calculating…';
    try {
      const {rate,date}=await fetchRate(from,to);
      const daily=(amt*rate), total=(daily*days);
      el.textContent=`Daily: ${getFlag(to)} ${formatAmount(daily)} ${to}\nTotal (${days} days): ${getFlag(to)} ${formatAmount(total)} ${to}\n\nRate: 1 ${from} = ${formatAmount(rate)} ${to} · ${date}`;
    } catch { el.textContent='Error fetching rate.'; }
  }

  /* Fee Comparator */
  async function calcFees() {
    const amt=parseFloat(document.getElementById('fc-amount').value)||0;
    const from=ssVal('fc-from-wrap'), to=ssVal('fc-to-wrap');
    const el=document.getElementById('fc-result');
    el.innerHTML='Calculating…';
    try {
      const {rate,date}=await fetchRate(from,to);
      const mid=amt*rate;
      const good=(v,pct)=>`<span style="color:var(--gradient-start)">${formatAmount(v)} ${to}</span> <small style="color:var(--text-tertiary)">(-${formatAmount(mid-v)})</small>`;
      const bad=(v,pct)=>`<span style="color:#ff8080">${formatAmount(v)} ${to}</span> <small style="color:var(--text-tertiary)">(-${formatAmount(mid-v)})</small>`;
      el.innerHTML=
        `<strong style="color:var(--text-primary)">Mid-market (fair):</strong> ${formatAmount(mid)} ${to} · ${date}<br><br>`+
        `<strong>Wise (~0.5% fee):</strong> ${good(mid*0.995)}<br>`+
        `<strong>Remitly (~0.8%):</strong> ${good(mid*0.992)}<br>`+
        `<strong>Western Union (~2%):</strong> ${bad(mid*0.98)}<br>`+
        `<strong>Bank wire (~3% + $35 fee):</strong> ${bad((mid*0.97)-35)}<br>`+
        `<strong>Airport kiosk (~8%):</strong> ${bad(mid*0.92)}`;
    } catch { el.innerHTML='Error fetching rate.'; }
  }

  /* Rate Change */
  async function calcRateChange() {
    const yours=parseFloat(document.getElementById('rc-rate').value)||0;
    const from=ssVal('rc-from-wrap'), to=ssVal('rc-to-wrap');
    const el=document.getElementById('rc-result');
    if (!yours) { el.textContent='Enter the rate you were quoted.'; return; }
    try {
      const {rate,date}=await fetchRate(from,to);
      const diff=((yours-rate)/rate*100);
      const cost=(Math.abs(rate-yours)/rate*1000);
      el.textContent=`Live rate: ${formatAmount(rate)} ${to} · ${date}\nYour rate: ${formatAmount(yours)} ${to}\nDifference: ${diff>=0?'+':''}${diff.toFixed(2)}%\nHidden cost per 1,000 ${from}: ${formatAmount(cost)} ${to}`;
    } catch { el.textContent='Error fetching rate.'; }
  }

  /* Bank Markup */
  async function calcMarkup() {
    const bank=parseFloat(document.getElementById('mk-rate').value)||0;
    const from=ssVal('mk-from-wrap'), to=ssVal('mk-to-wrap');
    const el=document.getElementById('mk-result');
    if (!bank) { el.textContent="Enter your bank's quoted rate."; return; }
    try {
      const {rate,date}=await fetchRate(from,to);
      const markup=((rate-bank)/rate*100);
      const cost=Math.abs(rate-bank)/rate*1000;
      el.textContent=`Mid-market: ${formatAmount(rate)} · ${date}\nBank rate: ${formatAmount(bank)}\nMarkup: ${Math.abs(markup).toFixed(2)}%\nYou lose per 1,000 ${from}: ${formatAmount(cost)} ${to}`;
    } catch { el.textContent='Error fetching rate.'; }
  }

  populateAll();
</script>
</body>
</html>
